<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;padding:10px}
.row{display:flex;gap:10px}
.col{flex:1}
.player{padding:8px;border:1px solid #334155;border-radius:8px;margin:4px;cursor:pointer}
.selected{background:#22c55e;color:#000}
.captain{border:2px solid gold}
.vc{border:2px solid orange}
.section{margin-bottom:10px}
.toggle{cursor:pointer;background:#1e293b;padding:8px;border-radius:8px}
.btn{padding:10px;background:#22c55e;border:none;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<h2>Team Builder</h2>

<div id="players"></div>

<button class="btn" onclick="next()">Next</button>

<div id="cv" style="display:none;"></div>

<button class="btn" onclick="saveTeam()">Save Team</button>
<button class="btn" onclick="joinContest()">Join Contest</button>

<h3>My Teams</h3>
<div id="teams"></div>

<script>

// 🔥 FIREBASE CONFIG (APNA DAL)
firebase.initializeApp({
  apiKey:"XXX",
  authDomain:"XXX",
  projectId:"XXX"
});
const db=firebase.firestore();
const auth=firebase.auth();

let authReady=false;
auth.signInAnonymously().then(()=>authReady=true);

// ===== PLAYERS =====
const roles=["WK","BAT","AR","BOWL"];
let open={WK:true,BAT:true,AR:true,BOWL:true};

const players=Array.from({length:16},(_,i)=>({
  id:i+1,
  name:"P"+(i+1),
  team:i<8?"A":"B",
  role:roles[i%4]
}));

let selected=[], captain=null, vc=null, lastTeamId=null;

// ===== RENDER =====
function render(){
  document.getElementById('players').innerHTML=
    roles.map(r=>renderSection(r)).join('');
}

function renderSection(role){
  const A=players.filter(p=>p.role===role&&p.team==="A");
  const B=players.filter(p=>p.role===role&&p.team==="B");

  let rows="";
  const max=Math.max(A.length,B.length);

  for(let i=0;i<max;i++){
    rows+=`
    <div class="row">
      <div class="col">${A[i]?renderPlayer(A[i]):""}</div>
      <div class="col">${B[i]?renderPlayer(B[i]):""}</div>
    </div>`;
  }

  return `
  <div class="section">
    <div class="toggle" onclick="open['${role}']=!open['${role}'];render()">
      ${open[role]?'▼':'▶'} ${role}
    </div>
    ${open[role]?rows:""}
  </div>`;
}

function renderPlayer(p){
  return `
  <div class="player ${selected.includes(p.id)?'selected':''}"
  onclick="toggle(${p.id})">
  ${p.name}
  </div>`;
}

function toggle(id){
  if(selected.includes(id)){
    selected=selected.filter(x=>x!==id);
    if(captain===id) captain=null;
    if(vc===id) vc=null;
  }else{
    if(selected.length>=11){alert("Max 11");return;}
    selected.push(id);
  }
  render();
}

// ===== STEP 2 =====
function next(){
  if(selected.length!==11){alert("Select 11");return;}

  document.getElementById('cv').style.display='block';

  document.getElementById('cv').innerHTML=
    selected.map(id=>{
      const p=players.find(x=>x.id===id);
      return `
      <div class="player ${captain===id?'captain':''} ${vc===id?'vc':''}"
      onclick="setCV(${id})">
        ${p.name} ${captain===id?'C':''} ${vc===id?'VC':''}
      </div>`;
    }).join('');
}

function setCV(id){

  if(captain===id){
    captain=null;
    next();
    return;
  }

  if(vc===id){
    vc=null;
    next();
    return;
  }

  if(!captain){
    captain=id;
    next();
    return;
  }

  if(!vc && id!==captain){
    vc=id;
    next();
    return;
  }

  alert("Already selected C & VC");
}

// ===== SAVE TEAM =====
async function saveTeam(){

  if(!authReady){alert("Wait 2 sec");return;}

  if(selected.length!==11){alert("Select 11");return;}

  if(!captain||!vc||captain===vc){
    alert("Invalid C/VC");
    return;
  }

  const uid=auth.currentUser.uid;

  const doc=await db.collection("teams").add({
    uid,players:selected,captain,vc
  });

  lastTeamId=doc.id;

  alert("Team Saved!");
  loadTeams();
}

// ===== JOIN =====
async function joinContest(){

  if(!authReady){alert("Wait");return;}

  if(!lastTeamId){alert("Save team first");return;}

  const uid=auth.currentUser.uid;

  await db.collection("contestEntries").add({
    uid,teamId:lastTeamId,points:0
  });

  alert("Joined!");
}

// ===== LOAD =====
async function loadTeams(){
  const uid=auth.currentUser.uid;

  const snap=await db.collection("teams").where("uid","==",uid).get();

  document.getElementById('teams').innerHTML=
    snap.docs.map(d=>"<div>Team "+d.id+"</div>").join('');
}

// INIT
render();

</script>

</body>
</html>
