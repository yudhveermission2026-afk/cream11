<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cream11 Phase 5</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:16px}
.player{padding:8px;border:1px solid #334155;border-radius:8px;margin:5px;cursor:pointer}
.selected{background:#22c55e;color:#000}
.captain{border:2px solid gold}
.vc{border:2px solid orange}
.row{display:flex;gap:10px}
.col{flex:1}
.btn{padding:10px;background:#22c55e;border:none;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<h2>Fantasy App Phase 5</h2>

<div id="players"></div>
<button class="btn" onclick="next()">Next</button>

<div id="cv" style="display:none;"></div>
<button class="btn" onclick="saveTeam()">Save Team</button>

<button class="btn" onclick="joinContest()">Join Contest</button>

<h3>My Teams</h3>
<div id="teams"></div>

<script>

// 🔥 Firebase config (APNA DAL)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.signInAnonymously();

// ===== PLAYERS =====
const players = Array.from({length:16},(_,i)=>({
  id:i+1,
  name:"Player "+(i+1),
  team:i<8?"A":"B"
}));

let selected=[], captain=null, vc=null;

// ===== RENDER =====
function render(){
  document.getElementById('players').innerHTML =
    players.map(p=>`
      <div class="player ${selected.includes(p.id)?'selected':''}"
      onclick="toggle(${p.id})">${p.name}</div>
    `).join('');
}

function toggle(id){
  if(selected.includes(id)){
    selected=selected.filter(x=>x!==id);
  }else{
    if(selected.length>=11){alert("Max 11");return;}
    selected.push(id);
  }
  render();
}

// ===== STEP 2 =====
function next(){
  if(selected.length!==11){alert("Select 11");return;}
  document.getElementById('cv').style.display='block';

  document.getElementById('cv').innerHTML =
    selected.map(id=>{
      const p=players.find(x=>x.id===id);
      return `
      <div class="player ${captain===id?'captain':''} ${vc===id?'vc':''}"
      onclick="setCV(${id})">
        ${p.name} ${captain===id?'C':''} ${vc===id?'VC':''}
      </div>`;
    }).join('');
}

function setCV(id){
  if(!captain) captain=id;
  else if(!vc && id!==captain) vc=id;
  else{
    if(id===captain) captain=null;
    if(id===vc) vc=null;
  }
  next();
}

// ===== SAVE TEAM =====
async function saveTeam(){
  const uid = auth.currentUser.uid;

  await db.collection("teams").add({
    uid,
    players:selected,
    captain,
    vc
  });

  alert("Saved!");
  loadTeams();
}

// ===== LOAD =====
async function loadTeams(){
  const uid = auth.currentUser.uid;

  const snap = await db.collection("teams")
    .where("uid","==",uid).get();

  document.getElementById('teams').innerHTML =
    snap.docs.map(d=>"<div>Team</div>").join('');
}

// ===== CONTEST =====
async function joinContest(){
  const uid = auth.currentUser.uid;

  await db.collection("contestEntries").add({
    uid,
    team:selected,
    points:0
  });

  alert("Joined!");
}

render();
loadTeams();

</script>

</body>
</html>
