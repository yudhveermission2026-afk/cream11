<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cream11 Phase 4</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;margin:0;padding:16px}
.btn{padding:10px;background:#22c55e;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}
.player{padding:8px;border:1px solid #334155;border-radius:8px;margin:5px;cursor:pointer}
.selected{background:#22c55e;color:#000}
.disabled{opacity:0.4;pointer-events:none}
.row{display:flex;gap:10px}
.col{flex:1}
</style>
</head>

<body>

<h2 id="title">Team Builder</h2>

<button class="btn" onclick="logout()">Logout</button>

<div id="step1">
<div id="playersContainer"></div>
<button class="btn" onclick="goToCaptain()">Next (Select Captain)</button>
</div>

<div id="step2" style="display:none;">
<h3>Select Captain (2x points)</h3>
<div id="captainList"></div>

<h3>Select Vice Captain (1.5x)</h3>
<div id="vcList"></div>

<button class="btn" onclick="saveTeam()">Save Team</button>
</div>

<h3>My Teams</h3>
<div id="myTeams"></div>

<h3>Join Contest</h3>
<button class="btn" onclick="joinContest()">Join (10 coins)</button>

<h3>My Contests</h3>
<div id="myContests"></div>

<script>

// ===== AUTH (simple) =====
function logout(){
  localStorage.removeItem('user');
  location.reload();
}
if(!localStorage.getItem('user')){
  localStorage.setItem('user','ok');
}

// ===== PLAYERS =====
const players=[
{id:1,name:"Rohit",team:"A",role:"BAT",playing:true},
{id:2,name:"Gill",team:"A",role:"BAT",playing:true},
{id:3,name:"Ishan",team:"A",role:"WK",playing:true},
{id:4,name:"Hardik",team:"A",role:"AR",playing:true},
{id:5,name:"Bumrah",team:"A",role:"BOWL",playing:false},

{id:6,name:"Warner",team:"B",role:"BAT",playing:true},
{id:7,name:"Smith",team:"B",role:"BAT",playing:true},
{id:8,name:"Buttler",team:"B",role:"WK",playing:true},
{id:9,name:"Stokes",team:"B",role:"AR",playing:true},
{id:10,name:"Starc",team:"B",role:"BOWL",playing:false}
];

const roles=["WK","BAT","AR","BOWL"];
let openSections={WK:true,BAT:true,AR:true,BOWL:true};

let selected=[];
let captain=null;
let vc=null;

// ===== RENDER =====
function render(){
  document.getElementById('playersContainer').innerHTML =
    roles.map(r=>renderSection(r)).join('');
}

function renderSection(role){
  const teamA=players.filter(p=>p.role===role&&p.team==="A");
  const teamB=players.filter(p=>p.role===role&&p.team==="B");

  let rows="";
  const max=Math.max(teamA.length,teamB.length);

  for(let i=0;i<max;i++){
    const a=teamA[i];
    const b=teamB[i];

    rows+=`
    <div class="row">
      <div class="col">${a?renderPlayer(a):""}</div>
      <div class="col">${b?renderPlayer(b):""}</div>
    </div>`;
  }

  return `
  <div>
    <div onclick="toggleSection('${role}')" style="cursor:pointer;">
      ${openSections[role]?'▼':'▶'} ${role}
    </div>
    ${openSections[role]?rows:""}
  </div>`;
}

function renderPlayer(p){
  return `
  <div class="player ${selected.includes(p.id)?'selected':''} ${!p.playing?'disabled':''}"
    onclick="toggle(${p.id})">
    ${p.name} (${p.team})
    ${!p.playing?" - Not Playing":""}
  </div>`;
}

function toggle(id){
  const p=players.find(x=>x.id===id);
  if(!p.playing){alert("Not playing");return;}

  if(selected.includes(id)){
    selected=selected.filter(x=>x!==id);
  }else{
    if(selected.length>=11){alert("Max 11");return;}
    selected.push(id);
  }
  render();
}

function toggleSection(role){
  openSections[role]=!openSections[role];
  render();
}

// ===== STEP 2 =====
function goToCaptain(){
  if(selected.length!==11){
    alert("Select 11 players first");
    return;
  }

  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';

  renderCaptainVC();
}

function renderCaptainVC(){
  const playersList=selected.map(id=>players.find(p=>p.id===id));

  document.getElementById('captainList').innerHTML=
    playersList.map(p=>`
      <div onclick="captain=${p.id};renderCaptainVC()" 
        class="player ${captain===p.id?'selected':''}">
        ${p.name}
      </div>
    `).join('');

  document.getElementById('vcList').innerHTML=
    playersList.map(p=>`
      <div onclick="vc=${p.id};renderCaptainVC()" 
        class="player ${vc===p.id?'selected':''}">
        ${p.name}
      </div>
    `).join('');
}

// ===== SAVE TEAM =====
function saveTeam(){
  if(!captain||!vc||captain===vc){
    alert("Select different C & VC");
    return;
  }

  const teams=JSON.parse(localStorage.getItem('teams')||"[]");

  teams.push({
    players:selected,
    captain,
    vc
  });

  localStorage.setItem('teams',JSON.stringify(teams));

  alert("Team Saved!");
  loadTeams();
}

// ===== LOAD =====
function loadTeams(){
  const teams=JSON.parse(localStorage.getItem('teams')||"[]");

  document.getElementById('myTeams').innerHTML=
    teams.map(t=>`
      <div>
        Players: ${t.players.join(",")}<br>
        C: ${t.captain} | VC: ${t.vc}
      </div>
    `).join('');
}

// ===== CONTEST =====
let coins=100;

function joinContest(){
  if(coins<10){alert("Not enough coins");return;}

  coins-=10;

  const contests=JSON.parse(localStorage.getItem('contests')||"[]");
  contests.push({time:Date.now()});
  localStorage.setItem('contests',JSON.stringify(contests));

  loadContests();
}

function loadContests(){
  const contests=JSON.parse(localStorage.getItem('contests')||"[]");

  document.getElementById('myContests').innerHTML=
    contests.map(c=>"<div>Joined Contest</div>").join('');
}

// INIT
render();
loadTeams();
loadContests();

</script>

</body>
</html>
