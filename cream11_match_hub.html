<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cream11 Match Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09111f;--card:#121c31;--card2:#0e172a;--border:#223250;--text:#eef5ff;--muted:#99a7c2;--accent:#f97316;--accent2:#fb923c;--green:#22c55e;--red:#ef4444}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#08101d 0%,#0c1730 100%);color:var(--text);font-family:Inter,sans-serif}
.wrap{max-width:1200px;margin:0 auto;padding:18px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.brand{font-family:Rajdhani,sans-serif;font-size:44px;font-weight:700;letter-spacing:1px}
.sub{color:var(--muted);font-size:14px}
.btn{border:none;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}
.btn.main{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn.alt{background:#314564;color:#fff}
.card{background:rgba(18,28,49,.96);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:16px}
.status{padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:#102347;color:#d8e4ff;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
@media (max-width:900px){.grid{grid-template-columns:1fr}}
.match-card{background:linear-gradient(180deg,#12213f 0%,#0f1930 100%);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:.18s transform ease,.18s border-color ease}
.match-card:hover{transform:translateY(-2px);border-color:#325080}
.match-title{font-weight:700;font-size:18px;line-height:1.25;margin-bottom:8px}
.meta{font-size:13px;color:var(--muted);margin:4px 0}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700;margin-right:6px}
.badge.live{background:#3c1016;color:#ffb7bf}
.badge.upcoming{background:#103421;color:#98ffbc}
.badge.done{background:#323b13;color:#fff1a3}
.teams{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:10px 0}
.team{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;font-weight:700}
.vs{font-family:Rajdhani,sans-serif;font-size:24px;color:var(--muted)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.hidden{display:none!important}
.empty{color:var(--muted);padding:14px 0}
input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:#0d1730;color:#fff;margin-bottom:12px}
.auth-card{max-width:420px;margin:80px auto}
.auth-tabs{display:flex;gap:8px;margin-bottom:12px}
.auth-tab{flex:1;border:none;border-radius:12px;padding:12px;background:#314564;color:#fff;font-weight:700;cursor:pointer}
.auth-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.section-title{font-family:Rajdhani,sans-serif;font-size:26px;font-weight:700;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">

  <div id="authView">
    <div class="card auth-card">
      <div class="brand">CREAM11</div>
      <div class="sub" style="margin-bottom:14px">Login UI + real matches API connected</div>

      <div class="auth-tabs">
        <button id="signupTab" class="auth-tab active" onclick="switchAuth('signup')">Sign Up</button>
        <button id="signinTab" class="auth-tab" onclick="switchAuth('signin')">Sign In</button>
      </div>

      <div id="signupBox">
        <input id="suName" placeholder="Full name">
        <input id="suEmail" placeholder="Email">
        <input id="suPass" type="password" placeholder="Password">
        <button class="btn main" style="width:100%" onclick="fakeSignup()">Create Account</button>
      </div>

      <div id="signinBox" class="hidden">
        <input id="siEmail" placeholder="Email">
        <input id="siPass" type="password" placeholder="Password">
        <button class="btn main" style="width:100%" onclick="fakeSignin()">Sign In</button>
      </div>

      <div class="status" id="authStatus">Abhi yahan se app open hogi. Next stage me isi ko real Firebase auth se replace karenge.</div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <div class="top">
      <div>
        <div class="brand">CREAM11</div>
        <div class="sub">Real matches loading from <code>/api/matches</code></div>
      </div>
      <div class="row">
        <button class="btn alt" onclick="loadMatches()">Refresh Matches</button>
        <button class="btn alt" onclick="logout()">Logout</button>
      </div>
    </div>

    <div id="appStatus" class="status">Matches load kar rahe hain...</div>

    <div class="card">
      <div class="section-title">Match Hub</div>
      <div class="row" style="margin-bottom:12px">
        <button class="btn alt" onclick="setFilter('all')">All</button>
        <button class="btn alt" onclick="setFilter('live')">Live</button>
        <button class="btn alt" onclick="setFilter('upcoming')">Upcoming</button>
      </div>
      <div id="matchesGrid" class="grid"></div>
    </div>

    <div id="selectedMatchCard" class="card hidden">
      <div class="section-title">Selected Match</div>
      <div id="selectedMatchContent"></div>
      <div class="row" style="margin-top:12px">
        <button class="btn main">Create Team</button>
        <button class="btn alt">View Contests</button>
      </div>
    </div>
  </div>

</div>

<script>
let filterMode = 'all';
let matchesCache = [];

function switchAuth(mode){
  document.getElementById('signupBox').classList.toggle('hidden', mode !== 'signup');
  document.getElementById('signinBox').classList.toggle('hidden', mode !== 'signin');
  document.getElementById('signupTab').classList.toggle('active', mode === 'signup');
  document.getElementById('signinTab').classList.toggle('active', mode === 'signin');
}

function fakeSignup(){
  const name = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pass = document.getElementById('suPass').value.trim();
  if(name.length < 3) return authMsg('Name minimum 3 letters ka daalo');
  if(!email.includes('@')) return authMsg('Valid email daalo');
  if(pass.length < 6) return authMsg('Password minimum 6 chars ka hona chahiye');
  localStorage.setItem('cream11_demo_user', JSON.stringify({name,email}));
  enterApp();
}

function fakeSignin(){
  const email = document.getElementById('siEmail').value.trim();
  const pass = document.getElementById('siPass').value.trim();
  if(!email.includes('@')) return authMsg('Valid email daalo');
  if(!pass) return authMsg('Password daalo');
  localStorage.setItem('cream11_demo_user', JSON.stringify({name:email.split('@')[0],email}));
  enterApp();
}

function authMsg(msg){
  document.getElementById('authStatus').textContent = msg;
}

function logout(){
  localStorage.removeItem('cream11_demo_user');
  document.getElementById('appView').classList.add('hidden');
  document.getElementById('authView').classList.remove('hidden');
}

function enterApp(){
  document.getElementById('authView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  loadMatches();
}

function setStatus(msg){
  document.getElementById('appStatus').textContent = msg;
}

function normalizeState(match){
  const status = (match.status || '').toLowerCase();
  if(status.includes('day') || status.includes('trail') || status.includes('innings') || status.includes('session')) return 'live';
  if(match.matchStarted === false || status.includes('opt to') || status.includes('starts') || status.includes('scheduled')) return 'upcoming';
  if(match.matchEnded === true || status.includes('won by') || status.includes('match over') || status.includes('completed')) return 'done';
  return 'upcoming';
}

function stateBadge(state){
  if(state === 'live') return '<span class="badge live">LIVE</span>';
  if(state === 'done') return '<span class="badge done">DONE</span>';
  return '<span class="badge upcoming">UPCOMING</span>';
}

function setFilter(mode){
  filterMode = mode;
  renderMatches();
}

function renderMatches(){
  const grid = document.getElementById('matchesGrid');
  let list = [...matchesCache];

  if(filterMode !== 'all'){
    list = list.filter(m => normalizeState(m) === filterMode);
  }

  if(!list.length){
    grid.innerHTML = '<div class="empty">No matches found for this filter.</div>';
    return;
  }

  grid.innerHTML = list.map(match => {
    const teams = match.teams || [];
    const teamA = teams[0] || (match.teamInfo && match.teamInfo[0] ? match.teamInfo[0].name : 'Team A');
    const teamB = teams[1] || (match.teamInfo && match.teamInfo[1] ? match.teamInfo[1].name : 'Team B');
    const state = normalizeState(match);

    return `
      <div class="match-card" onclick="selectMatch('${match.id}')">
        ${stateBadge(state)}
        <div class="match-title">${match.name || (teamA + ' vs ' + teamB)}</div>
        <div class="teams">
          <div class="team">${teamA}</div>
          <div class="vs">VS</div>
          <div class="team">${teamB}</div>
        </div>
        <div class="meta"><strong>Status:</strong> ${match.status || 'N/A'}</div>
        <div class="meta"><strong>Venue:</strong> ${match.venue || 'N/A'}</div>
        <div class="meta"><strong>Date:</strong> ${match.date || 'N/A'}</div>
      </div>
    `;
  }).join('');
}

function selectMatch(id){
  const match = matchesCache.find(m => m.id === id);
  if(!match) return;

  const teams = match.teams || [];
  const teamA = teams[0] || (match.teamInfo && match.teamInfo[0] ? match.teamInfo[0].name : 'Team A');
  const teamB = teams[1] || (match.teamInfo && match.teamInfo[1] ? match.teamInfo[1].name : 'Team B');

  const score = Array.isArray(match.score)
    ? match.score.map(s => `${s.inning}: ${s.r}/${s.w} (${s.o})`).join('<br>')
    : 'Score not available';

  document.getElementById('selectedMatchContent').innerHTML = `
    <div class="match-title">${match.name || (teamA + ' vs ' + teamB)}</div>
    <div class="teams">
      <div class="team">${teamA}</div>
      <div class="vs">VS</div>
      <div class="team">${teamB}</div>
    </div>
    <div class="meta"><strong>Status:</strong> ${match.status || 'N/A'}</div>
    <div class="meta"><strong>Venue:</strong> ${match.venue || 'N/A'}</div>
    <div class="meta"><strong>Date:</strong> ${match.date || 'N/A'}</div>
    <div class="meta"><strong>Score:</strong><br>${score}</div>
  `;
  document.getElementById('selectedMatchCard').classList.remove('hidden');
  setStatus(`Selected match: ${match.name || (teamA + ' vs ' + teamB)}`);
}

async function loadMatches(){
  const grid = document.getElementById('matchesGrid');
  grid.innerHTML = '';
  setStatus('Matches load ho rahe hain...');
  try{
    const res = await fetch('/api/matches');
    const json = await res.json();
    const list = Array.isArray(json.data) ? json.data : [];
    matchesCache = list;
    if(!list.length){
      setStatus('API ne koi match return nahi kiya.');
    }else{
      setStatus(`${list.length} matches load ho gaye.`);
    }
    renderMatches();
  }catch(err){
    console.error(err);
    setStatus('Matches load nahi hue. /api/matches check karo.');
    grid.innerHTML = '<div class="empty">Failed to load matches.</div>';
  }
}

(function init(){
  const u = localStorage.getItem('cream11_demo_user');
  if(u){ enterApp(); }
})();
</script>
</body>
</html>
