<!-- CREAM11 FINAL VERSION -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cream11 Final</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<style>
body{background:#0a0e1a;color:#fff;font-family:sans-serif}
.container{max-width:900px;margin:auto;padding:20px}
.player{padding:10px;border:1px solid #444;margin:5px;cursor:pointer;border-radius:8px}
.selected{background:#22c55e;color:black}
.blocked{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:10px}
</style>
</head>

<body>
<div class="container">

<h2>CREAM11 FINAL</h2>

<div id="players"></div>
<p id="status"></p>

</div>

<script>
const RULES={
WK:{min:1,max:4},
BAT:{min:3,max:6},
AR:{min:1,max:4},
BOWL:{min:3,max:6},
TEAM_MAX:7,
TOTAL:11
}

const players=[
{id:1,name:"Ishan",team:"A",role:"WK"},
{id:2,name:"Pant",team:"A",role:"WK"},
{id:3,name:"Buttler",team:"B",role:"WK"},

{id:4,name:"Rohit",team:"A",role:"BAT"},
{id:5,name:"Gill",team:"A",role:"BAT"},
{id:6,name:"Surya",team:"A",role:"BAT"},
{id:7,name:"Warner",team:"B",role:"BAT"},
{id:8,name:"Smith",team:"B",role:"BAT"},

{id:9,name:"Hardik",team:"A",role:"AR"},
{id:10,name:"Jadeja",team:"A",role:"AR"},
{id:11,name:"Stokes",team:"B",role:"AR"},

{id:12,name:"Bumrah",team:"A",role:"BOWL"},
{id:13,name:"Shami",team:"A",role:"BOWL"},
{id:14,name:"Starc",team:"B",role:"BOWL"},
{id:15,name:"Cummins",team:"B",role:"BOWL"}
]

let selected=[]

function count(role){
return selected.filter(id=>players.find(p=>p.id===id).role===role).length
}

function countTeam(team){
return selected.filter(id=>players.find(p=>p.id===id).team===team).length
}

function canPick(player){

if(selected.length>=RULES.TOTAL) return "11 players full"

if(countTeam(player.team)>=RULES.TEAM_MAX)
return "Max 7 players per team"

if(count(player.role)>=RULES[player.role].max)
return "Max "+RULES[player.role].max+" "+player.role

// FUTURE CHECK (MAIN LOGIC)
let next=[...selected,player.id]

let nextCount={
WK:next.filter(id=>players.find(p=>p.id===id).role==='WK').length,
BAT:next.filter(id=>players.find(p=>p.id===id).role==='BAT').length,
AR:next.filter(id=>players.find(p=>p.id===id).role==='AR').length,
BOWL:next.filter(id=>players.find(p=>p.id===id).role==='BOWL').length
}

let left=RULES.TOTAL-next.length

let need=
Math.max(0,RULES.WK.min-nextCount.WK)+
Math.max(0,RULES.BAT.min-nextCount.BAT)+
Math.max(0,RULES.AR.min-nextCount.AR)+
Math.max(0,RULES.BOWL.min-nextCount.BOWL)

if(need>left){
return "Wrong selection path"
}

return true
}

function toggle(id){

let p=players.find(x=>x.id===id)

if(selected.includes(id)){
selected=selected.filter(x=>x!==id)
render()
return
}

let check=canPick(p)

if(check!==true){
document.getElementById("status").innerText=check
return
}

selected.push(id)
render()
}

function render(){

let html=""

players.forEach(p=>{
html+=`
<div class="player ${selected.includes(p.id)?"selected":""}"
onclick="toggle(${p.id})">
${p.name} (${p.role}) - Team ${p.team}
</div>`
})

document.getElementById("players").innerHTML=html
document.getElementById("status").innerText="Selected: "+selected.length
}

render()
</script>

</body>
</html>
