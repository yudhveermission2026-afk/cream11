<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cream11 Phase 3.2</title>

<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;margin:0;padding:16px}
.btn{padding:10px;background:#22c55e;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.row{display:flex;gap:10px}
.col{flex:1}
.player{padding:8px;border:1px solid #334155;border-radius:8px;margin-bottom:6px;cursor:pointer}
.selected{background:#22c55e;color:#000}
.disabled{opacity:0.4;pointer-events:none}
.tab{padding:8px;border-radius:6px;background:#334155;cursor:pointer}
.active{background:#22c55e;color:#000}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2 id="authTitle">Sign Up</h2>

  <div style="display:flex;gap:10px;margin-bottom:10px;">
    <div class="tab active" onclick="switchAuth('signup')" id="signupTab">Sign Up</div>
    <div class="tab" onclick="switchAuth('signin')" id="signinTab">Sign In</div>
  </div>

  <div id="signupBox">
    <input id="suName" placeholder="Name"><br><br>
    <input id="suEmail" placeholder="Email"><br><br>
    <input id="suPass" placeholder="Password" type="password"><br><br>
    <button class="btn" onclick="signup()">Create Account</button>
  </div>

  <div id="signinBox" style="display:none;">
    <input id="siEmail" placeholder="Email"><br><br>
    <input id="siPass" placeholder="Password" type="password"><br><br>
    <button class="btn" onclick="signin()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h2>Team Builder</h2>
  <button class="btn" onclick="logout()">Logout</button>

  <!-- FILTER -->
  <div style="display:flex;gap:6px;margin:10px 0;">
    <button class="btn" onclick="setRole('ALL')">ALL</button>
    <button class="btn" onclick="setRole('WK')">WK</button>
    <button class="btn" onclick="setRole('BAT')">BAT</button>
    <button class="btn" onclick="setRole('AR')">AR</button>
    <button class="btn" onclick="setRole('BOWL')">BOWL</button>
  </div>

  <div class="row">
    <div class="col">
      <h4>Team A</h4>
      <div id="teamA"></div>
    </div>

    <div class="col">
      <h4>Team B</h4>
      <div id="teamB"></div>
    </div>
  </div>

  <button class="btn" onclick="saveTeam()">Save Team</button>

  <h3>My Teams</h3>
  <div id="myTeams"></div>
</div>

<script>
// ===== AUTH UI =====
function switchAuth(mode){
  document.getElementById('signupBox').style.display = mode==='signup'?'block':'none';
  document.getElementById('signinBox').style.display = mode==='signin'?'block':'none';

  document.getElementById('signupTab').classList.toggle('active',mode==='signup');
  document.getElementById('signinTab').classList.toggle('active',mode==='signin');
}

// ===== MOCK AUTH (Firebase later replace) =====
function signup(){
  localStorage.setItem('user','logged');
  startApp();
}
function signin(){
  localStorage.setItem('user','logged');
  startApp();
}
function logout(){
  localStorage.removeItem('user');
  location.reload();
}

function startApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
}

// ===== PLAYERS =====
const players=[
{id:1,name:"Rohit",team:"A",role:"BAT",playing:true},
{id:2,name:"Gill",team:"A",role:"BAT",playing:true},
{id:3,name:"Ishan",team:"A",role:"WK",playing:true},
{id:4,name:"Hardik",team:"A",role:"AR",playing:true},
{id:5,name:"Bumrah",team:"A",role:"BOWL",playing:false},

{id:6,name:"Warner",team:"B",role:"BAT",playing:true},
{id:7,name:"Smith",team:"B",role:"BAT",playing:true},
{id:8,name:"Buttler",team:"B",role:"WK",playing:true},
{id:9,name:"Stokes",team:"B",role:"AR",playing:true},
{id:10,name:"Starc",team:"B",role:"BOWL",playing:false}
];

let selected=[];
let currentRole='ALL';

// ===== RENDER =====
function render(){
  document.getElementById('teamA').innerHTML=
    players.filter(p=>p.team==='A').filter(filterRole).map(renderPlayer).join('');

  document.getElementById('teamB').innerHTML=
    players.filter(p=>p.team==='B').filter(filterRole).map(renderPlayer).join('');
}

function filterRole(p){
  return currentRole==='ALL'||p.role===currentRole;
}

function renderPlayer(p){
  return `
    <div class="player ${selected.includes(p.id)?'selected':''} ${!p.playing?'disabled':''}"
    onclick="toggle(${p.id})">
      <b>${p.name}</b> (${p.role})
      ${!p.playing?' - Not Playing':''}
    </div>
  `;
}

// ===== SELECT =====
function toggle(id){
  const p=players.find(x=>x.id===id);

  if(!p.playing){ alert("Not in playing 11"); return; }

  if(selected.includes(id)){
    selected=selected.filter(x=>x!==id);
  }else{
    if(selected.length>=11){ alert("Max 11"); return; }
    selected.push(id);
  }
  render();
}

// ===== SAVE TEAM =====
function saveTeam(){
  const teams=JSON.parse(localStorage.getItem('teams')||"[]");
  teams.push(selected);
  localStorage.setItem('teams',JSON.stringify(teams));
  loadTeams();
}

function loadTeams(){
  const teams=JSON.parse(localStorage.getItem('teams')||"[]");
  document.getElementById('myTeams').innerHTML=
    teams.map(t=>"<div>"+t.join(", ")+"</div>").join("");
}

function setRole(r){
  currentRole=r;
  render();
}

// INIT
if(localStorage.getItem('user')) startApp();
render();
loadTeams();
</script>

</body>
</html>
